name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"

permissions:
  contents: write   # create GitHub Release

env:
  BINARY_NAME: bsl-analyzer

jobs:
  # ── 1. Build native binary per platform ─────────────────────────────────────
  build-binary:
    name: Build binary (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-14          # Apple Silicon
            asset: bsl-analyzer-darwin-arm64
          - target: darwin-x64
            runner: macos-13          # Intel
            asset: bsl-analyzer-darwin-x64
          - target: linux-x64
            runner: ubuntu-22.04
            asset: bsl-analyzer-linux-x64
          - target: win32-x64
            runner: windows-2022
            asset: bsl-analyzer-win32-x64.exe
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies (including Nuitka)
        run: uv pip install -e ".[dev,build]" --system

      - name: Build binary (Nuitka)
        shell: bash
        run: |
          python -m nuitka \
            --standalone \
            --onefile \
            --output-filename=${{ env.BINARY_NAME }}${{ matrix.ext }} \
            --output-dir=dist \
            --include-package=bsl_analyzer \
            --include-package=tree_sitter \
            --include-package=tree_sitter_bsl \
            --include-package=fastmcp \
            --include-package=pygls \
            --include-package=watchfiles \
            --include-package=rich \
            --include-data-dir=data=data \
            --assume-yes-for-downloads \
            --jobs=2 \
            src/bsl_analyzer/__main__.py

      - name: Rename asset
        shell: bash
        run: |
          mv dist/${{ env.BINARY_NAME }}${{ matrix.ext }} dist/${{ matrix.asset }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/${{ matrix.asset }}
          retention-days: 1

  # ── 2. Package platform-specific VSIX ───────────────────────────────────────
  package-vsix:
    name: Package VSIX (${{ matrix.target }})
    needs: build-binary
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: darwin-arm64
            asset: bsl-analyzer-darwin-arm64
          - target: darwin-x64
            asset: bsl-analyzer-darwin-x64
          - target: linux-x64
            asset: bsl-analyzer-linux-x64
          - target: win32-x64
            asset: bsl-analyzer-win32-x64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install npm deps
        working-directory: vscode-extension
        run: npm ci

      - name: Compile TypeScript
        working-directory: vscode-extension
        run: npm run compile

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: vscode-extension/bin/

      - name: Make binary executable
        run: chmod +x vscode-extension/bin/${{ matrix.asset }} || true

      - name: Rename binary to canonical name
        run: |
          if [[ "${{ matrix.target }}" == "win32-x64" ]]; then
            mv vscode-extension/bin/${{ matrix.asset }} vscode-extension/bin/bsl-analyzer.exe
          else
            mv vscode-extension/bin/${{ matrix.asset }} vscode-extension/bin/bsl-analyzer
          fi

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Package VSIX (platform-specific)
        working-directory: vscode-extension
        run: |
          npx vsce package \
            --target ${{ matrix.target }} \
            --out bsl-analyzer-${{ steps.version.outputs.version }}-${{ matrix.target }}.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.target }}
          path: vscode-extension/bsl-analyzer-${{ steps.version.outputs.version }}-${{ matrix.target }}.vsix
          retention-days: 1

  # ── 3. Build Python wheel ────────────────────────────────────────────────────
  build-wheel:
    name: Build Python wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel
        run: |
          pip install build
          python -m build

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel
          path: dist/
          retention-days: 1

  # ── 4. GitHub Release + publish ─────────────────────────────────────────────
  publish:
    name: Publish
    needs: [build-binary, package-vsix, build-wheel]
    runs-on: ubuntu-latest
    environment: release

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          # Binaries
          find artifacts/ -name "bsl-analyzer-*" -not -name "*.vsix" \
            -exec cp {} release-assets/ \;
          # VSIXes
          find artifacts/ -name "*.vsix" -exec cp {} release-assets/ \;
          # Python wheel + sdist
          find artifacts/python-wheel/ -name "*.whl" -o -name "*.tar.gz" \
            | xargs -I{} cp {} release-assets/
          ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: BSL Analyzer ${{ github.ref_name }}
          body: |
            ## BSL Analyzer ${{ github.ref_name }}

            ### Установка расширения VSCode
            Установите из [VS Code Marketplace](https://marketplace.visualstudio.com/items?itemName=mussolene.bsl-analyzer)
            или скачайте `.vsix` для вашей платформы ниже и установите через:
            ```
            code --install-extension bsl-analyzer-*.vsix
            ```

            ### Установка CLI
            ```bash
            pip install bsl-analyzer==${{ github.ref_name }}
            ```

            ### Файлы релиза
            | Файл | Описание |
            |---|---|
            | `bsl-analyzer-darwin-arm64` | macOS Apple Silicon |
            | `bsl-analyzer-darwin-x64` | macOS Intel |
            | `bsl-analyzer-linux-x64` | Linux x86_64 |
            | `bsl-analyzer-win32-x64.exe` | Windows x64 |
            | `*.vsix` | VSCode расширение (платформо-специфичные) |
            | `*.whl` | Python wheel |
          files: release-assets/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: artifacts/python-wheel/
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}

      - name: Setup Node for vsce
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Publish to VS Marketplace
        working-directory: vscode-extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          npm ci
          # Publish each platform VSIX
          for vsix in ../artifacts/vsix-*/*.vsix; do
            echo "Publishing $vsix"
            npx vsce publish --packagePath "$vsix" --pat "$VSCE_PAT"
          done
