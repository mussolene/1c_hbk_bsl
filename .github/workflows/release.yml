name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"

permissions:
  contents: write   # create GitHub Release

env:
  BINARY_NAME: onec-hbk-bsl

jobs:
  # ── 1. Build native binary per platform ─────────────────────────────────────
  build-binary:
    name: Build binary (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-26          # Apple Silicon — 3 cores
            asset: onec-hbk-bsl-darwin-arm64
            jobs: 3
            cache_path: ~/Library/Caches/Nuitka
          - target: darwin-x64
            runner: macos-26-intel    # Intel — 3 cores
            asset: onec-hbk-bsl-darwin-x64
            jobs: 3
            cache_path: ~/Library/Caches/Nuitka
          - target: linux-x64
            runner: ubuntu-22.04      # 2 cores
            asset: onec-hbk-bsl-linux-x64
            jobs: 2
            cache_path: ~/.cache/Nuitka
          - target: win32-x64
            runner: windows-2022      # 2 cores
            asset: onec-hbk-bsl-win32-x64.exe
            ext: .exe
            jobs: 2
            cache_path: ~\AppData\Local\Nuitka\Nuitka\Cache

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Cache pip downloads
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.target }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ matrix.target }}-

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies (including Nuitka)
        run: uv pip install -e ".[dev,build]" --system

      # Cache compiled Nuitka C objects — biggest speedup on repeat runs
      - name: Cache Nuitka compilation
        uses: actions/cache@v4
        with:
          path: ${{ matrix.cache_path }}
          key: nuitka-${{ matrix.target }}-py311-${{ hashFiles('src/**/*.py', 'pyproject.toml') }}
          restore-keys: nuitka-${{ matrix.target }}-py311-

      - name: Build binary (Nuitka)
        shell: bash
        run: |
          python -m nuitka \
            --standalone \
            --onefile \
            --deployment \
            --python-flag=no_site,no_warnings \
            --output-filename=${{ env.BINARY_NAME }}${{ matrix.ext }} \
            --output-dir=dist \
            --include-package=onec_hbk_bsl \
            --include-package=tree_sitter \
            --include-package=tree_sitter_bsl \
            --include-package=fastmcp \
            --include-package=pygls \
            --include-package=watchfiles \
            --include-package=rich \
            --nofollow-import-to=tkinter,test,unittest,pydoc,doctest,distutils \
            --include-data-dir=data=data \
            --assume-yes-for-downloads \
            --jobs=${{ matrix.jobs }} \
            src/onec_hbk_bsl/__main__.py

      - name: Rename asset
        shell: bash
        run: mv dist/${{ env.BINARY_NAME }}${{ matrix.ext }} dist/${{ matrix.asset }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/${{ matrix.asset }}
          retention-days: 1

  # ── 2. Package platform-specific VSIX ───────────────────────────────────────
  package-vsix:
    name: Package VSIX (${{ matrix.target }})
    needs: build-binary
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: darwin-arm64
            asset: onec-hbk-bsl-darwin-arm64
          - target: darwin-x64
            asset: onec-hbk-bsl-darwin-x64
          - target: linux-x64
            asset: onec-hbk-bsl-linux-x64
          - target: win32-x64
            asset: onec-hbk-bsl-win32-x64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install npm deps
        working-directory: vscode-extension
        run: env -u npm_config_devdir -u NPM_CONFIG_DEVDIR npm ci

      - name: Typecheck extension (tsc --noEmit)
        working-directory: vscode-extension
        run: env -u npm_config_devdir -u NPM_CONFIG_DEVDIR npm run typecheck

      - name: Webpack bundle (extension.js)
        working-directory: vscode-extension
        run: env -u npm_config_devdir -u NPM_CONFIG_DEVDIR npm run compile

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: vscode-extension/bin/

      - name: Make binary executable
        run: chmod +x vscode-extension/bin/${{ matrix.asset }} || true

      - name: Rename binary to canonical name
        run: |
          if [[ "${{ matrix.target }}" == "win32-x64" ]]; then
            mv vscode-extension/bin/${{ matrix.asset }} vscode-extension/bin/onec-hbk-bsl.exe
          else
            mv vscode-extension/bin/${{ matrix.asset }} vscode-extension/bin/onec-hbk-bsl
          fi

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Package VSIX (platform-specific)
        working-directory: vscode-extension
        run: |
          unset npm_config_devdir NPM_CONFIG_DEVDIR
          npx @vscode/vsce package \
            --no-dependencies \
            --target ${{ matrix.target }} \
            --out onec-hbk-bsl-${{ steps.version.outputs.version }}-${{ matrix.target }}.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.target }}
          path: vscode-extension/onec-hbk-bsl-${{ steps.version.outputs.version }}-${{ matrix.target }}.vsix
          retention-days: 1

  # ── 3. Build Python wheel ────────────────────────────────────────────────────
  build-wheel:
    name: Build Python wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel
        run: |
          pip install build
          python -m build

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel
          path: dist/
          retention-days: 1

  # ── 4. GitHub Release + publish ─────────────────────────────────────────────
  publish:
    name: Publish
    needs: [build-binary, package-vsix, build-wheel]
    runs-on: ubuntu-latest
    environment: release

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts/ -name "onec-hbk-bsl-*" -not -name "*.vsix" \
            -exec cp {} release-assets/ \;
          find artifacts/ -name "*.vsix" -exec cp {} release-assets/ \;
          find artifacts/python-wheel/ \( -name "*.whl" -o -name "*.tar.gz" \) \
            -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: 1C HBK BSL ${{ github.ref_name }}
          body: |
            ## 1C HBK BSL ${{ github.ref_name }}

            ### Установка расширения VSCode
            Установите из [VS Code Marketplace](https://marketplace.visualstudio.com/items?itemName=mussolene.1c-hbk-bsl)
            или скачайте `.vsix` для вашей платформы ниже:
            ```
            code --install-extension onec-hbk-bsl-*.vsix
            ```

            ### Установка CLI
            ```bash
            pip install onec-hbk-bsl==${{ github.ref_name }}
            ```

            ### Файлы релиза
            | Файл | Описание |
            |---|---|
            | `onec-hbk-bsl-darwin-arm64` | macOS Apple Silicon |
            | `onec-hbk-bsl-darwin-x64` | macOS Intel |
            | `onec-hbk-bsl-linux-x64` | Linux x86_64 |
            | `onec-hbk-bsl-win32-x64.exe` | Windows x64 |
            | `*.vsix` | VSCode расширение (платформо-специфичные) |
            | `*.whl` | Python wheel |
          files: release-assets/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Setup Node for vsce
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Publish to VS Marketplace
        working-directory: vscode-extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          env -u npm_config_devdir -u NPM_CONFIG_DEVDIR npm ci
          unset npm_config_devdir NPM_CONFIG_DEVDIR
          for vsix in ../artifacts/vsix-*/*.vsix; do
            echo "Publishing $vsix"
            npx @vscode/vsce publish --packagePath "$vsix" --pat "$VSCE_PAT"
          done
