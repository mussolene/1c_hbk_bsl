name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv pip install -e ".[dev]" --system

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Run tests
        run: pytest --cov=src/onec_hbk_bsl --cov-report=term-missing -q

  # PyInstaller onefile (same spec as release) — catches missing hooks/deps early
  build-binary-smoke:
    name: PyInstaller binary (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv pip install -e ".[dev,build]" --system

      - name: Build onefile binary
        run: |
          python -m PyInstaller --clean --noconfirm \
            --workpath build/pyinstaller \
            --distpath dist \
            packaging/onec-hbk-bsl.spec

      - name: Smoke test binary
        run: |
          ./dist/onec-hbk-bsl --version
          ./dist/onec-hbk-bsl --help | head -n 5

  lint-ts:
    name: TypeScript compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install npm deps
        working-directory: vscode-extension
        run: npm ci

      - name: Typecheck extension (tsc --noEmit)
        working-directory: vscode-extension
        run: npm run typecheck

      - name: Webpack bundle (extension.js)
        working-directory: vscode-extension
        run: npm run compile
